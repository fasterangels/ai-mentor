name: full-regression-gate

on:
  workflow_dispatch:
  pull_request:
    branches: [ "main" ]

jobs:
  backend-full-tests:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'full-gate'))
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend deps
        run: |
          python -m pip install -U pip
          pip install -r backend/requirements.txt

      - name: Run full backend test suite
        env:
          PYTHONPATH: backend
        run: |
          python -m pytest backend/tests/ -v | tee pytest-log.txt

      - name: Run full system audit
        env:
          PYTHONPATH: backend
        run: |
          python -m tools.system_audit

      - name: Upload pytest log artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-pytest-logs
          path: pytest-log.txt

      - name: Upload system audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: system-audit-report
          path: reports/system_audit/system_audit_*.json

      - name: System audit summary
        if: always()
        run: |
          python - "$GITHUB_STEP_SUMMARY" << 'PY'
          import glob
          import json
          import sys

          summary_path = sys.argv[1]
          paths = sorted(glob.glob("reports/system_audit/system_audit_*.json"))
          if not paths:
              with open(summary_path, "a", encoding="utf-8") as f:
                  f.write("## System Audit\n")
                  f.write("No system audit report found.\n")
              raise SystemExit(0)

          report_path = paths[-1]
          with open(report_path, encoding="utf-8") as fh:
              data = json.load(fh)

          sa = data.get("system_audit", {})
          commit = sa.get("commit") or ""
          overall = sa.get("overall_status") or "UNKNOWN"
          baseline_hash = sa.get("baseline_hash") or ""

          det = (sa.get("determinism_check") or {}).get("status")
          eval_block = sa.get("evaluation_metrics_present") or {}
          eval_status = eval_block.get("status")
          artifact_status = (sa.get("artifact_integrity") or {}).get("status")
          metrics_status = (sa.get("metrics_sanity") or {}).get("status")

          has_rm = eval_block.get("has_reason_metrics")
          has_rfm = eval_block.get("has_reason_failure_metrics")
          has_et = eval_block.get("has_error_taxonomy")

          lines = []
          lines.append("## System Audit")
          lines.append(f"- Overall: **{overall}**")
          if commit:
              lines.append(f"- Commit: `{commit}`")
          if baseline_hash:
              lines.append(f"- Baseline hash: `{baseline_hash}`")
          lines.append("- Checks:")
          lines.append(f"  - Determinism: **{det}**")
          lines.append(f"  - Evaluation metrics: **{eval_status}**")
          lines.append(f"    - reason_metrics present: **{bool(has_rm)}**")
          lines.append(f"    - reason_failure_metrics present: **{bool(has_rfm)}**")
          lines.append(f"    - error_taxonomy present: **{bool(has_et)}**")
          lines.append(f"  - Artifact integrity: **{artifact_status}**")
          lines.append(f"  - Metrics sanity: **{metrics_status}**")

          with open(summary_path, "a", encoding="utf-8") as f:
              f.write("\\n".join(lines) + "\\n")
          PY

  frontend-checks:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'full-gate'))
    defaults:
      run:
        working-directory: app/frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: app/frontend/package-lock.json

      - name: Install frontend deps
        run: npm ci

      - name: Run frontend lint
        run: npm run lint

      - name: Run frontend tests (if configured)
        run: npm test || echo "npm test skipped (no script or tests failed)"

