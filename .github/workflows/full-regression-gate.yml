name: full-regression-gate

on:
  workflow_dispatch:
  pull_request:
    branches: [ "main" ]

jobs:
  backend-full-tests:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'full-gate'))
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend deps
        run: |
          python -m pip install -U pip
          pip install -r backend/requirements.txt

      - name: Run full backend test suite
        env:
          PYTHONPATH: backend
        run: |
          python -m pytest backend/tests/ -v | tee pytest-log.txt

      - name: Upload pytest log artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-pytest-logs
          path: pytest-log.txt

  frontend-checks:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'full-gate'))
    defaults:
      run:
        working-directory: app/frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: app/frontend/package-lock.json

      - name: Install frontend deps
        run: npm ci

      - name: Run frontend lint
        run: npm run lint

      - name: Run frontend tests (if configured)
        run: npm test || echo "npm test skipped (no script or tests failed)"

